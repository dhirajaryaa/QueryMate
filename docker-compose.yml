# postgres database for QueryMate application
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: querymate-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: querymate

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: